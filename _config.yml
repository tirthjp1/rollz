# Social media
instagram_url: "https://www.instagram.com/rollzvancouver/"
tiktok_url: "https://www.tiktok.com/@rollzvancouver"
facebook_url: "https://www.facebook.com/rollzicecream"

# Google Analytics
google_analytics: "G-7GNPX9HYF9"

# Navigation
header_pages:
  - menu.md
  - order.md
  - about.md
  - locations.md
  - contact.md

# Minima theme settings
minima:
  skin: classic
  social_links:
    instagram: rollzvancouver
  date_format: "%b %-d, %Y"

# SEO and plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - qr-beta
  - qr-code
