# Site settings
theme: minima
title: Rollz Ice Cream Vancouver
description: >-
  Vancouver's freshly rolled ice cream destination. Handcrafted Thai-style rolled ice cream,
  waffles, milkshakes & faloodas at 2685 Main St. Order pickup via Clover, buy gift cards,
  and explore 50+ flavors.
author: Rollz Vancouver
email: info@rollzyvr.com
url: "https://rollzyvr.com"
