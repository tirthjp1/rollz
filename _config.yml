# Site settings
theme: minima
title: Rollz Ice Cream Vancouver
tagline: "Freshly Rolled Ice Cream on Main St"
description: >-
  Rollz Ice Cream Vancouver — freshly rolled Thai-style ice cream, kulfi, waffles,
  milkshakes & faloodas at 2685 Main St, Vancouver BC. Over 50 handcrafted flavors.
  Order delivery on Uber Eats & SkipTheDishes. Open daily.
author: Rollz Vancouver
email: info@rollzyvr.com
url: "https://rollzyvr.com"
baseurl: ""
lang: en_CA

# Default social sharing image
og_image: "/assets/images/rollz.png"

# Location info (used in templates and structured data)
phone: "+1-604-283-4263"
address: "2685 Main St, Vancouver, BC V5Y 2R5"
hours: "Mon–Sun, 3 PM – 10 PM"
google_maps_url: "https://maps.app.goo.gl/ug1HBp7SoZCnSBga6"

# Online ordering
ubereats_url: "https://www.ubereats.com/ca/store/rollz-ice-cream-%26-desserts-vancouver-2685-main-st/JdOSxWqRTDua8GQM9edjEQ"
skipthedishes_url: "https://www.skipthedishes.com/rollz-ice-cream-main-street"

# Parent franchise
parent_brand_url: "https://www.rollzicecream.ca"

# Social media
instagram_url: "https://www.instagram.com/rollzvancouver/"
tiktok_url: "https://www.tiktok.com/@rollzvancouver"
facebook_url: "https://www.facebook.com/rollzicecream"

# Google Analytics
google_analytics: "G-7GNPX9HYF9"

# Navigation
header_pages:
  - menu.md
  - gallery.md
  - order.md
  - about.md

# Minima theme settings
minima:
  skin: classic
  social_links:
    instagram: rollzvancouver
  date_format: "%b %-d, %Y"

# SEO and plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - qr-beta
  - qr-code

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/rollz.png
