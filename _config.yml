address: "2685 Main St, Vancouver, BC V5Y 2R5"
hours: "Mon–Sun, 3 PM – 10 PM"
google_maps_url: "https://maps.google.com/?q=2685+Main+St+Vancouver+BC+V5Y+2R5"

# Online ordering
ubereats_url: "https://www.ubereats.com/ca/store/rollz-ice-cream-%26-desserts-vancouver-2685-main-st/JdOSxWqRTDua8GQM9edjEQ"
